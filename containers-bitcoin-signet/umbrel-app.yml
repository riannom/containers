manifestVersion: 1.1
id: containers-bitcoin-signet
name: Bitcoin signet
tagline: Bitcoin Core node on the signet test network
category: bitcoin
icon: https://raw.githubusercontent.com/riannom/containers/main/containers-bitcoin-signet/icon.svg
version: "1.2.4"
port: 38330
description: >-
  Runs a Bitcoin Core full node on signet, a stable, signed test
  network well suited for application development that needs
  predictable block production without testnet's volatile difficulty.

  Includes the same Home / Insight / Settings dashboard as the official
  Umbrel Bitcoin app, configured for signet. Tor and I2P sidecars are
  not deployed in this build, so those tabs will show as unreachable;
  clearnet sync and RPC work normally on the published RPC port (38332)
  and P2P port (38333).

  This app stores its data in its own per-app data directory and does
  not affect or share state with the mainnet bitcoind app installed
  from the official Umbrel store.
website: https://github.com/riannom/containers
support: https://github.com/riannom/containers
gallery: []
releaseNotes: ""
developer: riannom
repo: https://github.com/riannom/containers
path: ""
defaultUsername: ""
defaultPassword: ""
