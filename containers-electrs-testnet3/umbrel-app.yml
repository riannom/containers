manifestVersion: 1.1
id: containers-electrs-testnet3
name: Electrs testnet3
tagline: Electrum server backed by the testnet3 Bitcoin Core node
category: bitcoin
icon: https://raw.githubusercontent.com/riannom/containers/main/containers-electrs-testnet3/icon.svg
version: "0.11.2"
port: 60030
dependencies:
  - containers-bitcoin-testnet3
description: >-
  Runs Electrs (Roman Zeyde's Electrum server, v0.11.0) on top of the
  Bitcoin testnet3 app from this community store. Lets Electrum-compatible
  wallets (Sparrow, BlueWallet, Electrum desktop, etc.) connect to a
  personal index of the legacy testnet3 chain instead of a third-party
  public server.

  Pairs with the "Bitcoin testnet3" app. Both apps must be installed and
  the bitcoind app must be at version 1.2.4 or newer so it ships with the
  shared RPC password Electrs uses to authenticate.

  Connection details for wallets:
    Host:  umbrel.local (or your Umbrel device IP)
    Port:  60031
    Type:  TCP (no TLS)
website: https://github.com/riannom/containers
support: https://github.com/riannom/containers
gallery: []
releaseNotes: ""
developer: riannom
repo: https://github.com/riannom/containers
path: ""
defaultUsername: ""
defaultPassword: ""
