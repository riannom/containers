map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;

    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header X-App-Id "containers-bitcoin-testnet4" always;

    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '</head>' '<style>.x-net-banner{position:sticky;top:0;z-index:2147483647;width:100%;padding:10px 16px;text-align:center;font-family:-apple-system,system-ui,sans-serif;font-weight:700;letter-spacing:2px;font-size:13px;box-sizing:border-box;background:#2563eb;color:#fff;}</style></head>';
    sub_filter '<body>' '<body><div class="x-net-banner">TESTNET4 — modern Bitcoin testnet (BIP 94)</div>';
    sub_filter '<title>' '<title>[TESTNET4] ';

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 1d;
    }
}
