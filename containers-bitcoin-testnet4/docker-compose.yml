services:
  app_proxy:
    environment:
      APP_HOST: testnet4_web
      APP_PORT: 80

  testnet4_web:
    image: nginx:alpine
    user: root
    restart: on-failure
    depends_on:
      - testnet4_server
    entrypoint: ["sh", "-c"]
    command:
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX_EOF'
        map $$http_upgrade $$connection_upgrade {
            default upgrade;
            ''      close;
        }

        server {
            listen 80 default_server;
            server_name _;

            client_max_body_size 100M;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header X-App-Id "containers-bitcoin-testnet4" always;

            sub_filter_once on;
            sub_filter '</head>' '<style>.x-net-banner{position:sticky;top:0;z-index:2147483647;width:100%;padding:10px 16px;text-align:center;font-family:-apple-system,system-ui,sans-serif;font-weight:700;letter-spacing:2px;font-size:13px;box-sizing:border-box;background:#2563eb;color:#fff;}</style></head>';
            sub_filter '<body>' '<body><div class="x-net-banner">TESTNET4 — modern Bitcoin testnet (BIP 94)</div>';
            sub_filter '<title>' '<title>[TESTNET4] ';

            location / {
                proxy_pass http://testnet4_server:3000;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$remote_addr;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection $$connection_upgrade;
                proxy_set_header Accept-Encoding "";
                proxy_read_timeout 1d;
            }
        }
        NGINX_EOF
        exec nginx -g 'daemon off;'

  testnet4_server:
    image: ghcr.io/getumbrel/umbrel-bitcoin:v1.2.2
    restart: on-failure
    stop_grace_period: 15m30s
    ports:
      - "48333:48333"
      - "48332:48332"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      DEFAULT_CHAIN: testnet4
      BITCOIND_EXTRA_ARGS: '-deprecatedrpc=create_bdb'
      APPS_SUBNET: "10.21.0.0/16"
      P2P_PORT: "48333"
      P2P_WHITEBIND_PORT: "8335"
      RPC_PORT: "48332"
      TOR_PORT: "8334"
      ZMQ_RAWBLOCK_PORT: "28332"
      ZMQ_RAWTX_PORT: "28333"
      ZMQ_HASHBLOCK_PORT: "28334"
      ZMQ_SEQUENCE_PORT: "28335"
      ZMQ_HASHTX_PORT: "28336"
      TOR_HOST: "127.0.0.1"
      TOR_SOCKS_PORT: "9050"
      TOR_CONTROL_PORT: "9051"
      TOR_CONTROL_PASSWORD: "moneyprintergobrrr"
      I2P_HOST: "127.0.0.1"
      I2P_SAM_PORT: "7656"
      BITCOIND_IP: "0.0.0.0"
      RPC_USER: "umbrel"
      RPC_PASS: "umbrel-electrs-shared-pass"
      DEVICE_DOMAIN_NAME: "umbrel.local"
      P2P_HIDDEN_SERVICE: ""
      RPC_HIDDEN_SERVICE: ""
