manifestVersion: 1.1
id: containers-bitcoin-testnet4
name: Bitcoin testnet4
tagline: Bitcoin Core node on the testnet4 network (BIP 94)
category: bitcoin
icon: https://raw.githubusercontent.com/riannom/containers/main/containers-bitcoin-testnet4/icon.svg
version: "31.0"
port: 48332
description: >-
  Runs a Bitcoin Core full node on testnet4, the modern public Bitcoin
  test network introduced via BIP 94. Recommended over testnet3 for new
  development work targeting current consensus rules.

  This app stores its data in its own per-app data directory and does
  not affect or share state with the mainnet bitcoind app installed
  from the official Umbrel store.
