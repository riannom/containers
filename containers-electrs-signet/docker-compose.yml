services:
  app_proxy:
    environment:
      APP_HOST: electrs_signet_web
      APP_PORT: 80

  electrs_signet_web:
    image: nginx:alpine
    user: root
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/index.html:/usr/share/nginx/html/index.html:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  electrs_signet:
    image: getumbrel/electrs:v0.11.0
    user: root
    restart: on-failure
    stop_grace_period: 1m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "60051:60051"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      ELECTRS_LOG_FILTERS: "INFO"
      ELECTRS_NETWORK: "signet"
      ELECTRS_DAEMON_RPC_ADDR: "host.docker.internal:38332"
      ELECTRS_DAEMON_P2P_ADDR: "host.docker.internal:38333"
      ELECTRS_ELECTRUM_RPC_ADDR: "0.0.0.0:60051"
      ELECTRS_DB_DIR: "/data/db"
      ELECTRS_COOKIE: "umbrel:umbrel-electrs-shared-pass"
      ELECTRS_SERVER_BANNER: "Electrs signet (community store)"
